<style>
  /* TikTok Section Styles */
  .tiktok-carousel {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0.5rem 0;
  }
  .tiktok-carousel::-webkit-scrollbar { display: none; }

  .tiktok-card {
    flex: 0 0 auto;
    width: 220px;
    aspect-ratio: 9 / 16;
    scroll-snap-align: start;
    border-radius: 1rem;
    overflow: hidden;
    position: relative;
    background: #1a1c1a;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);

  }

    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  @media (min-width: 768px) {
    .tiktok-card { width: 240px; }
  }
  @media (min-width: 1024px) {
    .tiktok-card { width: 260px; }
  }

  .tiktok-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Skeleton loader shimmer */
  .tiktok-skeleton {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  .tiktok-skeleton.loaded { opacity: 0; pointer-events: none; }

  .tiktok-skeleton-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, #efeeeb 8%, #f4f3f1 18%, #efeeeb 33%);
    background-size: 200% 100%;
    animation: tiktok-shimmer 1.5s linear infinite;
  }
  @keyframes tiktok-shimmer {
    to { background-position: -200% 0; }
  }

  .tiktok-skeleton-play {
    position: relative;
    z-index: 6;
    width: 56px;
    height: 56px;
    border-radius: 50%;

  /* Dark gradient overlay for text readability */
  .tiktok-overlay-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(

      rgba(0,0,0,0.75) 0%,

    pointer-events: none;
  }

  /* Play/pause overlay button */
  .tiktok-play-overlay {
    position: absolute;
    inset: 0;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;

  .tiktok-play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;

    align-items: center;

    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .tiktok-card:hover .tiktok-play-btn,
  .tiktok-card.paused .tiktok-play-btn {
    opacity: 1;

  .tiktok-play-btn svg {

    height: 22px;
    fill: white;
  }
  .tiktok-play-btn .icon-pause { display: none; }
  .tiktok-card.paused .tiktok-play-btn .icon-play { display: block; }
  .tiktok-card.paused .tiktok-play-btn .icon-pause { display: none; }
  .tiktok-card:not(.paused) .tiktok-play-btn .icon-play { display: none; }

  /* Bottom-left author info */

  /* Right-side action buttons (TikTok-style) */

  .tiktok-action-item:active { transform: scale(1.2); }

  /* TikTok watermark */

    font-size: 0.625rem;
    font-weight: 700;
    color: white;

  /* View count badge (top area) */
  .tiktok-views-badge {
    position: absolute;
    top: 12px;
    left: 50%;

    z-index: 20;
    font-size: 0.625rem;

    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);

  /* Navigation arrows (desktop) */
  .tiktok-nav-arrow {

  .tiktok-nav-arrow:hover {

  .tiktok-nav-arrow:active { transform: translateY(-50%) scale(0.95); }
  .tiktok-nav-arrow svg {

    fill: #70585b;
  }
  .tiktok-nav-prev { left: 8px; }

  /* arrows now always visible */

  /* Music note animation (header icon) */
  .tiktok-music-note {

  /* TikTok embed container */
  .tiktok-embed-container {

  /* Progress bar at bottom of video */

  }
  .tiktok-progress-bar {

  }
</style>

<script>
(function() {
  'use strict';

  /* -------------------------------------------------- */
  /*  SVG icon fragments                                 */
  /* -------------------------------------------------- */
  const ICONS = {
    play: '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
    pause: '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>',
    heart: '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
    share: '<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>',
    volumeOff: '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>',
    volumeOn: '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>',
    tiktok: '<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.88-2.89 2.89 2.89 0 0 1 2.88-2.89c.28 0 .54.04.79.1V9.01a6.26 6.26 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.75a8.23 8.23 0 0 0 3.76.92V6.22a4.83 4.83 0 0 1 0 .47z"/></svg>',
    eye: '<svg viewBox="0 0 24 24" width="10" height="10"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="white"/></svg>'
  };

  const NUM_SLOTS = 18;
  const carousel = document.getElementById('tiktok-carousel');
  const prevBtn = document.getElementById('tiktok-prev');
  const nextBtn = document.getElementById('tiktok-next');
  let cards = [];
  let currentlyPlaying = null;

  /* -------------------------------------------------- */
  /*  Build empty card shells                            */
  /* -------------------------------------------------- */
  function buildCardShell(index) {
    const card = document.createElement('div');
    card.className = 'tiktok-card paused';
    card.dataset.index = index;

    card.innerHTML = `
      <!-- Skeleton loader -->
      <div class="tiktok-skeleton" data-skeleton>
        <div class="tiktok-skeleton-bg"></div>
        <div class="tiktok-skeleton-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>

      <!-- Video element — clean, no overlays -->
      <video
        playsinline
        loop
        muted
        preload="none"
        poster=""
        data-video
        style="cursor:pointer;"
      ></video>

      <!-- Minimal play button (only shows when paused) -->
      <div class="tiktok-play-overlay" data-play-overlay>
        <div class="tiktok-play-btn">
          <span class="icon-play">${ICONS.play}</span>
          <span class="icon-pause">${ICONS.pause}</span>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="tiktok-progress">
        <div class="tiktok-progress-bar" data-progress></div>
      </div>
    `;

    return card;
  }

  /* -------------------------------------------------- */
  /*  Initialize cards                                   */
  /* -------------------------------------------------- */
  for (let i = 0; i < NUM_SLOTS; i++) {
    const card = buildCardShell(i);
    carousel.appendChild(card);
    cards.push(card);
  }

  /* -------------------------------------------------- */
  /*  Play / pause logic                                 */
  /* -------------------------------------------------- */
  function playVideo(card) {
    const video = card.querySelector('[data-video]');
    if (!video.src && !video.querySelector('source')) return;

    // Pause any other playing video
    if (currentlyPlaying && currentlyPlaying !== card) {
      pauseVideo(currentlyPlaying);
    }

    video.play().then(() => {
      card.classList.remove('paused');
      currentlyPlaying = card;
    }).catch(() => {
      // Autoplay blocked — keep paused state
    });
  }

  function pauseVideo(card) {
    const video = card.querySelector('[data-video]');
    video.pause();
    card.classList.add('paused');
    if (currentlyPlaying === card) currentlyPlaying = null;
  }

  function togglePlay(card) {
    const video = card.querySelector('[data-video]');
    if (video.paused) {
      playVideo(card);
    } else {
      pauseVideo(card);
    }
  }

  function toggleMute(card) {
    const video = card.querySelector('[data-video]');
    const muteBtn = card.querySelector('[data-mute-btn]');
    video.muted = !video.muted;
    muteBtn.innerHTML = video.muted ? ICONS.volumeOff : ICONS.volumeOn;
  }

  /* -------------------------------------------------- */
  /*  Progress bar update                                */
  /* -------------------------------------------------- */
  function setupProgressUpdater(card) {
    const video = card.querySelector('[data-video]');
    const progressBar = card.querySelector('[data-progress]');

    video.addEventListener('timeupdate', function() {
      if (video.duration) {
        const pct = (video.currentTime / video.duration) * 100;
        progressBar.style.width = pct + '%';
      }
    });
  }

  /* -------------------------------------------------- */
  /*  Event delegation                                   */
  /* -------------------------------------------------- */
  cards.forEach(function(card) {
    const playOverlay = card.querySelector('[data-play-overlay]');

    // Click anywhere on card opens fullscreen modal
    card.addEventListener('click', function(e) {
      e.stopPropagation();
      var video = card.querySelector('[data-video]');
      var src = (video && video.src) ? video.src : card.dataset.videoSrc;
      if (src) {
        openVideoModal(src);
      }
    });

    setupProgressUpdater(card);
  });

  /* -------------------------------------------------- */
  /*  IntersectionObserver — autoplay when visible       */
  /* -------------------------------------------------- */
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      const card = entry.target;
      const video = card.querySelector('[data-video]');
      if (!video.src && !video.querySelector('source')) return;

      if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
        playVideo(card);
      } else if (!entry.isIntersecting) {
        pauseVideo(card);
      }
    });
  }, {
    threshold: [0, 0.6],
    rootMargin: '0px'
  });

  cards.forEach(function(card) { observer.observe(card); });

  /* -------------------------------------------------- */
  /*  Navigation arrows                                  */
  /* -------------------------------------------------- */
  function getCardWidth() {
    if (!cards.length) return 280;
    var card = cards[0];
    var style = window.getComputedStyle(card);
    return card.offsetWidth + parseInt(style.marginRight || 0);
  }

  prevBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    carousel.scrollBy({ left: -getCardWidth(), behavior: 'smooth' });
  });

  nextBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    carousel.scrollBy({ left: getCardWidth(), behavior: 'smooth' });
  });

  /* -------------------------------------------------- */
  /*  loadTikTokVideos(videos) — public API              */
  /* -------------------------------------------------- */
  window.loadTikTokVideos = function(videos) {
    if (!Array.isArray(videos)) return;

    videos.forEach(function(data, i) {
      if (i >= cards.length) return;
      var card = cards[i];
      var video = card.querySelector('[data-video]');
      var skeleton = card.querySelector('[data-skeleton]');

      // Store video data on the card for modal use
      card.dataset.videoSrc = data.src || '';

      // Set video source
      if (data.src) {
        video.src = data.src;

        // Generate thumbnail from first frame
        video.preload = 'metadata';
        video.addEventListener('loadedmetadata', function() {
          video.currentTime = 0.5; // grab frame at 0.5s
        });
        video.addEventListener('seeked', function handler() {
          try {
            var canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            video.poster = canvas.toDataURL('image/jpeg', 0.7);
          } catch(e) {}
          video.removeEventListener('seeked', handler);
        }, { once: true });

        video.addEventListener('loadeddata', function handler() {
          skeleton.classList.add('loaded');
          video.removeEventListener('loadeddata', handler);
        }, { once: true });

        // Fallback: hide skeleton after 3s even if loadeddata doesn't fire
        setTimeout(function() {
          skeleton.classList.add('loaded');
        }, 3000);
      }
    });

    // Hide unused card slots
    for (var j = videos.length; j < cards.length; j++) {
      cards[j].style.display = 'none';
    }
  };

  /* -------------------------------------------------- */
  /*  loadTikTokEmbeds(urls) — native embeds fallback   */
  /* -------------------------------------------------- */
  window.loadTikTokEmbeds = function(urls) {
    if (!Array.isArray(urls) || urls.length === 0) return;

    var embedContainer = document.getElementById('tiktok-embed-carousel');
    embedContainer.classList.remove('hidden');
    embedContainer.innerHTML = '';

    // Hide the video carousel
    document.getElementById('tiktok-carousel-wrapper').style.display = 'none';

    urls.forEach(function(url) {
      // Extract video ID from TikTok URL
      var match = url.match(/video\/(\d+)/);
      if (!match) return;
